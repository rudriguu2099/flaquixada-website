<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Consulado Fla Quixadá</title>
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/pages/login.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

</head>
<body>
    <div class="login-container">
        <header class="login-header">
            <a href="index.html" class="btn-voltar">
                <i class="ri-arrow-left-line"></i> Voltar
            </a>
        </header>

        <main class="login-main">
            <div class="login-icon-wrapper">
                <i class="ri-lock-line"></i>
            </div>
            
            <div class="login-titles">
                <h1>Acesso Restrito</h1>
                <p>Área exclusiva para administração</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">E-mail ou Usuário</label>
                    <input type="text" id="email" placeholder="admin@consuladofla.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-entrar">
                    ENTRAR NO SISTEMA <i class="ri-login-box-line"></i>
                </button>
            </form>
        </main>
    </div>

    <script type="module" src="./js/pages/login.js"></script>
</body>
</html>
