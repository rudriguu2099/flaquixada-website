<div class="admin-modal" id="modal-senha" style="display: none;">
    <div class="admin-modal-content">
        <div class="admin-modal-header">
            <h3><i class="ri-lock-password-line"></i> Alterar Senha</h3>
            <button class="btn-fechar" id="btn-fechar-modal-senha" title="Fechar"><i class="ri-close-line"></i></button>
        </div>
        
        <div class="admin-modal-body">
            <form id="form-alterar-senha">
                <div class="form-group">
                    <label for="senha-atual">Senha Atual</label>
                    <input type="password" id="senha-atual" required placeholder="Digite sua senha atual">
                </div>
                
                <div class="form-group">
                    <label for="nova-senha">Nova Senha</label>
                    <input type="password" id="nova-senha" required placeholder="No mínimo 8 caracteres">
                </div>
                
                <div class="form-group">
                    <label for="confirmar-senha">Confirmar Nova Senha</label>
                    <input type="password" id="confirmar-senha" required placeholder="Digite a nova senha novamente">
                </div>
                
                <div class="admin-modal-actions">
                    <button type="button" class="btn-secundary" id="btn-cancelar-senha">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Senha</button>
                </div>
            </form>
        </div>
    </div>
</div>
