<main class="admin-main admin-card perfil-main-card">
    <div class="admin-main-header">
        <h2><i class="ri-user-settings-line"></i> Meu Perfil</h2>
    </div>

    <div class="perfil-avatar-section">
        <div class="perfil-avatar">
            <i class="ri-user-fill"></i>
        </div>
        <span class="perfil-cargo" id="perfil-cargo">Carregando...</span>
    </div>

    <div class="perfil-form">
        <div class="input-group-perfil">
            <label>Nome</label>
            <div class="input-with-icon">
                <input type="text" id="perfil-nome" value="Carregando..." disabled class="admin-input disabled-input">
                <button class="btn-icon-perfil" title="Editar Nome"><i class="ri-pencil-line"></i></button>
            </div>
        </div>

        <div class="input-group-perfil">
            <label>E-mail</label>
            <div class="input-with-icon">
                <input type="email" id="perfil-email" value="Carregando..." disabled class="admin-input disabled-input">
                <button class="btn-icon-perfil" title="Editar E-mail"><i class="ri-pencil-line"></i></button>
            </div>
        </div>

        <div class="perfil-actions">
            <button class="btn-primary" id="btn-alterar-senha">
                <i class="ri-lock-password-line"></i> Alterar Senha
            </button>
        </div>
    </div>
</main>
